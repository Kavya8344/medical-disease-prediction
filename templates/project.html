<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand" href="/">🩺 Medical Disease Prediction</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/project">Prediction</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="section-title text-center">
            Disease Prediction Form
        </h2>

        <form action="/project" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" name="Age" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select name="Gender" class="form-select">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">BMI</label>
                    <input type="number" step="0.1" name="BMI" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Blood Pressure</label>
                    <input type="number" name="BloodPressure" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Glucose Level</label>
                    <input type="number" name="GlucoseLevel" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Cholesterol</label>
                    <input type="number" name="Cholesterol" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Heart Rate</label>
                    <input type="number" name="HeartRate" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Smoking</label>
                    <select name="Smoking" class="form-select">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Alcohol</label>
                    <select name="Alcohol" class="form-select">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Physical Activity</label>
                    <select name="PhysicalActivity" class="form-select">
                        <option value="0">Low</option>
                        <option value="1">Moderate</option>
                        <option value="2">High</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Family History</label>
                    <select name="FamilyHistory" class="form-select">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

            </div>

            <div class="text-center mt-4">

                <button class="btn btn-custom px-5">
                    Predict Disease
                </button>

            </div>

        </form>

    </div>

    {% if prediction %}

    <div class="result-box">

        <h3>Prediction Result</h3>

        <hr>

        <h4>{{ prediction }}</h4>

    </div>

    {% endif %}

</div>

<footer>

    <p class="mb-0">
        © 2026 Medical Disease Prediction System | Academic Machine Learning Project
    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
